{% extends "base.html" %}
{% block content %}
div class="search-container">
    <h2>🔍 Search Library</h2>
    <form action="/search_book_action" method="POST" class="search-form">
        <input type="text" name="search_query" placeholder="Search by Title or Author..." required>
        <button type="submit">Search</button>
    </form>

    {% if results %}
    <table class="styled-table">
        <thead>
            <tr>
                <th>Book ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Quantity</th>
            </tr>
        </thead>
        <tbody>
            {% for book in results %}
            <tr>
                <td>{{ book[0] }}</td>
                <td>{{ book[1] }}</td>
                <td>{{ book[2] }}</td>
                <td><span class="qty-tag">{{ book[3] }} Available</span></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% endif %}
</div>
{% endblock %}
