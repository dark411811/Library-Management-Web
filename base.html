<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library System - GDGP Hisar</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="logo">📚 GDGP HISAR</div>
        <div class="nav-links">
            <a href="{{ url_for('index') }}">Dashboard</a>
            <a href="{{ url_for('add_page') }}">Add Book</a>
            <a href="{{ url_for('issue_page') }}">Issue Book</a>
            <a href="{{ url_for('issued_details') }}">History</a>
            <a href="{{ url_for('about') }}">About</a>
        </div>
        <div class="nav-right">
            <span class="user-badge">👤 {{ session['user'] }}</span>
            <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
